behaviors:
  KartAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 0.3
      gail:
        gamma: 0.99
        strength: 0.8
        demo_path: Assets/Data/demos/kart_demo.demo
    behavioral_cloning:
      demo_path: Assets/Data/demos/kart_demo.demo
      strength: 0.8
      steps: 750000
    keep_checkpoints: 5
    checkpoint_interval: 500000
    max_steps: 5000000
    time_horizon: 128
    summary_freq: 20000
    threaded: true

